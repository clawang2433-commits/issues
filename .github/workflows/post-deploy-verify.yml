name: Post-Deploy Verify

# ============================================================================
# 位置: clawang2433-commits/issues (PUBLIC repo, GitHub Actions 无限免费)
# 触发方式:
#   1. 自动 (推荐): bazi repo push main → trigger-post-deploy.yml → workflow_dispatch API → 这里
#      Leo 部署后不需要手动触发, bazi main 更新就自动跑
#      需要 bazi repo 配置 ISSUES_REPO_PAT secret (Fine-grained PAT, Actions:write on issues repo)
#   2. 手动 (备用): gh workflow run post-deploy-verify.yml --repo clawang2433-commits/issues
# 驱动协作: 失败 → 自动开 Issue (bug + P0/P1 + deploy-failed) → Trae 进场修复
#
# 10 项全自动验收 (2026-07-18 V2, 全部内联 YAML curl, 不用 .sh):
#   1. Health (P0)
#   2. 14 Plugins (P1)
#   3. Frontend (P0)
#   4. Login (P0)
#   5. 3 大按钮之单人轻量 (P1) — mode=lightweight
#   6. 3 大按钮之单人全量 (P0) — mode=full + Phase1/2 字数 + 排版检查
#   7. 3 大按钮之双人合盘 (P0) — synastry/analyze
#   8. 神机追问 (P1) — plugin/career + 户口本 has_data
#   9. 中医库 (P1) — plugin/health + 古籍关键词 (RAG 起作用)
#  10. 历史记录 Phase1/2 产出 (P0) — report 字数 + 无乱码
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: '刚部署的 bazi PR #'
        required: false
        type: string
      deploy_note:
        description: '部署备注'
        required: false
        type: string
      test_suite:
        description: '测试套件 (path filter 决定, 默认 core)'
        required: false
        type: choice
        default: 'core'
        options:
          - core
          - worker
          - knowledge
          - api
          - frontend

permissions:
  issues: write
  contents: read

env:
  PROD_URL: https://xiantianyiqi.cn
  TEST_USER: demo
  TEST_PASS: demo123

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Init results
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"
          DEPLOY_NOTE="${{ inputs.deploy_note }}"
          TEST_SUITE="${{ inputs.test_suite || 'core' }}"
          SOURCE_COMMIT="${{ github.sha }}"

          echo "## Post-Deploy Verify Results (V2 — 10 项全自动)" > /tmp/results.md
          echo "" >> /tmp/results.md
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> /tmp/results.md
          echo "- **bazi PR**: ${PR_NUMBER:-N/A}" >> /tmp/results.md
          echo "- **Note**: ${DEPLOY_NOTE:-N/A}" >> /tmp/results.md
          echo "- **test_suite**: ${TEST_SUITE}" >> /tmp/results.md
          echo "- **Source commit**: ${SOURCE_COMMIT:-N/A}" >> /tmp/results.md
          echo "- **Trigger**: ${{ github.event_name }} by ${{ github.actor }}" >> /tmp/results.md
          echo "" >> /tmp/results.md
          echo "### Checks" >> /tmp/results.md
          echo "" >> /tmp/results.md
          : > /tmp/fails.txt
          echo "PR_NUMBER=${PR_NUMBER:-N/A}" >> $GITHUB_ENV
          echo "DEPLOY_NOTE=${DEPLOY_NOTE:-N/A}" >> $GITHUB_ENV
          echo "TEST_SUITE=${TEST_SUITE}" >> $GITHUB_ENV

      # ============================================================
      # Check 1: Health (P0)
      # ============================================================
      - name: Check 1 — Health (P0)
        continue-on-error: true
        run: |
          echo "▸ Check 1: Health..."
          RESP=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/health" 2>&1 || echo "CURL_FAILED")
          echo "  Response: $RESP"
          if echo "$RESP" | grep -q '"status":"ok"'; then
            echo "✅ PASS — health: ok" | tee -a /tmp/results.md
          else
            echo "❌ FAIL — health: $RESP" | tee -a /tmp/results.md
            echo "health" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 2: 14 Plugins (P1)
      # ============================================================
      - name: Check 2 — 14 Plugins (P1)
        continue-on-error: true
        run: |
          echo "▸ Check 2: 14 Plugins..."
          RESP=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/plugins" 2>&1 || echo "CURL_FAILED")
          COUNT=$(echo "$RESP" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          echo "  Plugin count: $COUNT"
          if [ "$COUNT" -eq 14 ]; then
            echo "✅ PASS — 14 plugins" | tee -a /tmp/results.md
          else
            echo "❌ FAIL — plugins: $COUNT (expected 14)" | tee -a /tmp/results.md
            echo "plugins" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 3: Frontend (P0)
      # ============================================================
      - name: Check 3 — Frontend (P0)
        continue-on-error: true
        run: |
          echo "▸ Check 3: Frontend..."
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "${{ env.PROD_URL }}/" 2>&1 || echo "000")
          echo "  HTTP code: $CODE"
          if [ "$CODE" = "200" ]; then
            echo "✅ PASS — frontend: 200" | tee -a /tmp/results.md
          else
            echo "❌ FAIL — frontend: $CODE (expected 200)" | tee -a /tmp/results.md
            echo "frontend" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 4: Login (P0) — 获取 token, 后续 check 复用
      # ============================================================
      - name: Check 4 — Login (P0)
        id: login
        continue-on-error: true
        run: |
          echo "▸ Check 4: Login..."
          RESP=$(curl -sf --max-time 15 -X POST "${{ env.PROD_URL }}/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ env.TEST_USER }}","password":"${{ env.TEST_PASS }}"}' 2>&1 || echo "CURL_FAILED")
          TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")
          if [ -n "$TOKEN" ]; then
            echo "✅ PASS — login: token ${#TOKEN} chars" | tee -a /tmp/results.md
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "❌ FAIL — login: no token ($RESP)" | tee -a /tmp/results.md
            echo "login" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 5: 3 大按钮之单人轻量 (P1) — mode=lightweight
      # ============================================================
      - name: Check 5 — 单人轻量 (P1)
        id: lightweight
        continue-on-error: true
        run: |
          echo "▸ Check 5: 3 大按钮之单人轻量 (mode=lightweight)..."
          TOKEN="${{ steps.login.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "⏭️ SKIP — login failed" | tee -a /tmp/results.md
            exit 0
          fi
          RESP=$(curl -sf --max-time 15 -X POST "${{ env.PROD_URL }}/api/v1/bazi/analyze" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"deploy-verify-light","gender":"男","birth_time":"1990-01-01 12:00","location":"北京","mode":"lightweight"}' 2>&1 || echo "CURL_FAILED")
          TASK_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null || echo "")
          if [ -z "$TASK_ID" ]; then
            echo "❌ FAIL — lightweight submit: no task_id ($RESP)" | tee -a /tmp/results.md
            echo "lightweight" >> /tmp/fails.txt
            exit 0
          fi
          echo "  task_id: $TASK_ID"
          FINAL=""
          for i in $(seq 1 96); do
            sleep 5
            STATUS=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/status/$TASK_ID" \
              -H "Authorization: Bearer $TOKEN" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "ERR")
            echo "  [$((i*5))s] $STATUS"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              FINAL="$STATUS"
              break
            fi
          done
          if [ "$FINAL" = "completed" ]; then
            echo "✅ PASS — lightweight: completed ($((i*5))s)" | tee -a /tmp/results.md
            echo "lightweight_task_id=$TASK_ID" >> $GITHUB_OUTPUT
          else
            echo "❌ FAIL — lightweight: $FINAL (480s 内未 completed)" | tee -a /tmp/results.md
            echo "lightweight" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 6: 3 大按钮之单人全量 (P0) — mode=full + Phase1/2 字数 + 排版
      # ============================================================
      - name: Check 6 — 单人全量 + Phase1/2 字数/排版 (P0)
        id: fullmode
        continue-on-error: true
        run: |
          echo "▸ Check 6: 3 大按钮之单人全量 (mode=full) + Phase1/2 产出..."
          TOKEN="${{ steps.login.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "⏭️ SKIP — login failed" | tee -a /tmp/results.md
            exit 0
          fi
          RESP=$(curl -sf --max-time 15 -X POST "${{ env.PROD_URL }}/api/v1/bazi/analyze" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"deploy-verify-full","gender":"男","birth_time":"1985-05-15 08:30","location":"上海","mode":"full"}' 2>&1 || echo "CURL_FAILED")
          TASK_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null || echo "")
          if [ -z "$TASK_ID" ]; then
            echo "❌ FAIL — full submit: no task_id ($RESP)" | tee -a /tmp/results.md
            echo "fullmode" >> /tmp/fails.txt
            exit 0
          fi
          echo "  task_id: $TASK_ID"
          FINAL=""
          for i in $(seq 1 180); do
            sleep 5
            STATUS=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/status/$TASK_ID" \
              -H "Authorization: Bearer $TOKEN" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "ERR")
            echo "  [$((i*5))s] $STATUS"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              FINAL="$STATUS"
              break
            fi
          done
          if [ "$FINAL" != "completed" ]; then
            echo "❌ FAIL — full mode: $FINAL (900s 内未 completed — 查 Worker crash/内存)" | tee -a /tmp/results.md
            echo "fullmode" >> /tmp/fails.txt
            exit 0
          fi
          # 拉取 report 检查 Phase1/2 字数 + 排版
          REPORT=$(curl -sf --max-time 15 "${{ env.PROD_URL }}/api/v1/bazi/report/$TASK_ID" \
            -H "Authorization: Bearer $TOKEN" 2>/dev/null || echo "{}")
          MD=$(echo "$REPORT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('markdown',''))" 2>/dev/null || echo "")
          MD_LEN=${#MD}
          echo "  report markdown: $MD_LEN chars"
          # 检查字数 (Phase1+Phase2 合计应 > 2000 字符)
          if [ "$MD_LEN" -lt 2000 ]; then
            echo "❌ FAIL — full mode report: $MD_LEN chars (< 2000, Phase1/2 产出不足)" | tee -a /tmp/results.md
            echo "fullmode_report" >> /tmp/fails.txt
            exit 0
          fi
          # 检查排版: 无连续 ~~ (删除线损坏) + 无连续 ??? (乱码)
          if echo "$MD" | grep -qE '~{3,}|\?{5,}'; then
            echo "❌ FAIL — full mode report: 排版损坏 (含 ~~~ 或 ?????)" | tee -a /tmp/results.md
            echo "fullmode_format" >> /tmp/fails.txt
            exit 0
          fi
          echo "✅ PASS — full mode: completed ($((i*5))s), report $MD_LEN chars, 排版正常" | tee -a /tmp/results.md
          echo "full_task_id=$TASK_ID" >> $GITHUB_OUTPUT

      # ============================================================
      # Check 7: 3 大按钮之双人合盘 (P0) — synastry/analyze
      # ============================================================
      - name: Check 7 — 双人合盘 (P0)
        id: synastry
        continue-on-error: true
        run: |
          echo "▸ Check 7: 3 大按钮之双人合盘..."
          TOKEN="${{ steps.login.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "⏭️ SKIP — login failed" | tee -a /tmp/results.md
            exit 0
          fi
          RESP=$(curl -sf --max-time 15 -X POST "${{ env.PROD_URL }}/api/v1/synastry/analyze" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"partner1":{"name":"甲方","birthTime":"1990-01-01 12:00","gender":"男","location":"北京"},"partner2":{"name":"乙方","birthTime":"1992-03-15 18:30","gender":"女","location":"上海"},"mode":"full"}' 2>&1 || echo "CURL_FAILED")
          TASK_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null || echo "")
          if [ -z "$TASK_ID" ]; then
            echo "❌ FAIL — synastry submit: no task_id ($RESP)" | tee -a /tmp/results.md
            echo "synastry" >> /tmp/fails.txt
            exit 0
          fi
          echo "  task_id: $TASK_ID"
          FINAL=""
          for i in $(seq 1 120); do
            sleep 5
            STATUS=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/status/$TASK_ID" \
              -H "Authorization: Bearer $TOKEN" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "ERR")
            echo "  [$((i*5))s] $STATUS"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              FINAL="$STATUS"
              break
            fi
          done
          if [ "$FINAL" = "completed" ]; then
            echo "✅ PASS — synastry: completed ($((i*5))s)" | tee -a /tmp/results.md
          else
            echo "❌ FAIL — synastry: $FINAL (600s 内未 completed — 查 Worker/heqi agent)" | tee -a /tmp/results.md
            echo "synastry" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 8: 神机追问 (P1) — plugin/career + 户口本 has_data
      # ============================================================
      - name: Check 8 — 神机追问 (career plugin + 户口本) (P1)
        id: shenji
        if: env.TEST_SUITE == 'worker' || env.TEST_SUITE == 'knowledge' || env.TEST_SUITE == 'core'
        continue-on-error: true
        run: |
          echo "▸ Check 8: 神机追问 (career plugin + 八字户口本)..."
          TOKEN="${{ steps.login.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "⏭️ SKIP — login failed" | tee -a /tmp/results.md
            exit 0
          fi
          # 8a: 检查户口本 has_data
          CORE_RESP=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/core" \
            -H "Authorization: Bearer $TOKEN" 2>/dev/null || echo "{}")
          HAS_DATA=$(echo "$CORE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('has_data', False))" 2>/dev/null || echo "False")
          echo "  户口本 has_data: $HAS_DATA"
          if [ "$HAS_DATA" != "True" ]; then
            echo "⚠️ WARN — 户口本 has_data=False (profile_loader 未注入, 不阻塞但需关注)" | tee -a /tmp/results.md
          fi
          # 8b: 用 Check 5 的 task_id 调 career plugin
          PARENT_TASK="${{ steps.lightweight.outputs.lightweight_task_id }}"
          if [ -z "$PARENT_TASK" ]; then
            echo "⏭️ SKIP — lightweight task 未完成, 无法测 plugin" | tee -a /tmp/results.md
            exit 0
          fi
          RESP=$(curl -sf --max-time 15 -X POST "${{ env.PROD_URL }}/api/v1/bazi/plugin/career" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"task_id\":\"$PARENT_TASK\"}" 2>&1 || echo "CURL_FAILED")
          PLUGIN_TASK_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('plugin_task_id',''))" 2>/dev/null || echo "")
          if [ -z "$PLUGIN_TASK_ID" ]; then
            echo "❌ FAIL — career plugin submit: no plugin_task_id ($RESP)" | tee -a /tmp/results.md
            echo "shenji" >> /tmp/fails.txt
            exit 0
          fi
          echo "  plugin_task_id: $PLUGIN_TASK_ID"
          FINAL=""
          for i in $(seq 1 96); do
            sleep 5
            STATUS=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/plugin/status/$PLUGIN_TASK_ID" \
              -H "Authorization: Bearer $TOKEN" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "ERR")
            echo "  [$((i*5))s] $STATUS"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              FINAL="$STATUS"
              break
            fi
          done
          if [ "$FINAL" = "completed" ]; then
            echo "✅ PASS — career plugin: completed ($((i*5))s), 户口本: $HAS_DATA" | tee -a /tmp/results.md
          else
            echo "❌ FAIL — career plugin: $FINAL (480s 内未 completed)" | tee -a /tmp/results.md
            echo "shenji" >> /tmp/fails.txt
          fi

      # ============================================================
      # Check 9: 中医库 (P1) — plugin/health + 古籍关键词 (RAG 起作用)
      # ============================================================
      - name: Check 9 — 中医库 (health plugin + RAG 古籍) (P1)
        id: tcm
        if: env.TEST_SUITE == 'worker' || env.TEST_SUITE == 'core'
        continue-on-error: true
        run: |
          echo "▸ Check 9: 中医库 (health plugin + RAG 古籍关键词)..."
          TOKEN="${{ steps.login.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "⏭️ SKIP — login failed" | tee -a /tmp/results.md
            exit 0
          fi
          PARENT_TASK="${{ steps.lightweight.outputs.lightweight_task_id }}"
          if [ -z "$PARENT_TASK" ]; then
            echo "⏭️ SKIP — lightweight task 未完成" | tee -a /tmp/results.md
            exit 0
          fi
          RESP=$(curl -sf --max-time 15 -X POST "${{ env.PROD_URL }}/api/v1/bazi/plugin/health" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"task_id\":\"$PARENT_TASK\"}" 2>&1 || echo "CURL_FAILED")
          PLUGIN_TASK_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('plugin_task_id',''))" 2>/dev/null || echo "")
          if [ -z "$PLUGIN_TASK_ID" ]; then
            echo "❌ FAIL — health plugin submit: no plugin_task_id ($RESP)" | tee -a /tmp/results.md
            echo "tcm" >> /tmp/fails.txt
            exit 0
          fi
          echo "  plugin_task_id: $PLUGIN_TASK_ID"
          FINAL=""
          for i in $(seq 1 96); do
            sleep 5
            STATUS=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/plugin/status/$PLUGIN_TASK_ID" \
              -H "Authorization: Bearer $TOKEN" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "ERR")
            echo "  [$((i*5))s] $STATUS"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              FINAL="$STATUS"
              break
            fi
          done
          if [ "$FINAL" != "completed" ]; then
            echo "❌ FAIL — health plugin: $FINAL (480s 内未 completed)" | tee -a /tmp/results.md
            echo "tcm" >> /tmp/fails.txt
            exit 0
          fi
          # 检查 RAG 古籍关键词 (TCM 按需注入, demo 用户可能不触发, 只 WARN 不 FAIL)
          REPORT=$(curl -sf --max-time 15 "${{ env.PROD_URL }}/api/v1/bazi/report/$PARENT_TASK" \
            -H "Authorization: Bearer $TOKEN" 2>/dev/null || echo "{}")
          MD=$(echo "$REPORT" | python3 -c "import sys,json; d=json.load(sys.stdin); po=d.get('plugin_outputs',{}); print(po.get('health','') if isinstance(po,dict) else '')" 2>/dev/null || echo "")
          if echo "$MD" | grep -qE "中医|TCM|古籍|黄帝内经|本草"; then
            echo "✅ PASS — health plugin: completed, RAG 古籍命中" | tee -a /tmp/results.md
          else
            echo "✅ PASS — health plugin: completed (RAG 古籍未命中, demo 用户可能无 A/B 级风险, 非阻塞)" | tee -a /tmp/results.md
          fi

      # ============================================================
      # Check 10: 历史记录 Phase1/2 产出 (P0) — report 字数 + 无乱码
      # ============================================================
      - name: Check 10 — 历史记录 Phase1/2 产出 (P0)
        continue-on-error: true
        run: |
          echo "▸ Check 10: 历史记录 Phase1/2 产出 (字数 + 排版)..."
          TOKEN="${{ steps.login.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "⏭️ SKIP — login failed" | tee -a /tmp/results.md
            exit 0
          fi
          # 拉历史
          HISTORY=$(curl -sf --max-time 10 "${{ env.PROD_URL }}/api/v1/bazi/history" \
            -H "Authorization: Bearer $TOKEN" 2>/dev/null || echo "[]")
          COMPLETED_TASK=$(echo "$HISTORY" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for t in d:
              if t.get('status')=='completed':
                  print(t['task_id']); break
          " 2>/dev/null || echo "")
          if [ -z "$COMPLETED_TASK" ]; then
            echo "❌ FAIL — 历史记录无 completed task" | tee -a /tmp/results.md
            echo "history" >> /tmp/fails.txt
            exit 0
          fi
          echo "  最近 completed task: $COMPLETED_TASK"
          # 拉 report 检查 Phase1/2
          REPORT=$(curl -sf --max-time 15 "${{ env.PROD_URL }}/api/v1/bazi/report/$COMPLETED_TASK" \
            -H "Authorization: Bearer $TOKEN" 2>/dev/null || echo "{}")
          MD=$(echo "$REPORT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('markdown',''))" 2>/dev/null || echo "")
          MD_LEN=${#MD}
          echo "  report markdown: $MD_LEN chars"
          if [ "$MD_LEN" -lt 1000 ]; then
            echo "❌ FAIL — 历史 report: $MD_LEN chars (< 1000, Phase1/2 产出不足)" | tee -a /tmp/results.md
            echo "history_report" >> /tmp/fails.txt
            exit 0
          fi
          # 检查排版: 无连续 ~~ (删除线损坏) + 无连续 ??? (乱码)
          if echo "$MD" | grep -qE '~{3,}|\?{5,}'; then
            echo "❌ FAIL — 历史 report 排版损坏 (含 ~~~ 或 ?????)" | tee -a /tmp/results.md
            echo "history_format" >> /tmp/fails.txt
            exit 0
          fi
          echo "✅ PASS — 历史 report: $MD_LEN chars, 排版正常" | tee -a /tmp/results.md

      # ============================================================
      # Aggregate + Create Issue on failure
      # ============================================================
      - name: Aggregate fails
        if: always()
        run: |
          ALL_FAILS=$(tr '\n' ' ' < /tmp/fails.txt | tr -s ' ' | sed 's/^ //;s/ $//')
          echo "ALL_FAILS=$ALL_FAILS" >> $GITHUB_ENV
          PRIORITY="P1"
          if echo "$ALL_FAILS" | grep -qE "health|frontend|login|fullmode|synastry|history"; then
            PRIORITY="P0"
          fi
          echo "PRIORITY=$PRIORITY" >> $GITHUB_ENV
          echo "Aggregated fails: '$ALL_FAILS' priority: $PRIORITY"

      - name: Create Issue on failure
        if: always() && env.ALL_FAILS != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('/tmp/results.md', 'utf8');
            const fails = process.env.ALL_FAILS.trim();
            const priority = process.env.PRIORITY;
            const prNumber = process.env.PR_NUMBER || 'N/A';
            const deployNote = process.env.DEPLOY_NOTE || 'N/A';
            const date = new Date().toISOString().slice(0,19).replace('T',' ');
            const title = `[Post-Deploy Verify V2] ${priority} FAILED — ${date} — ${fails}`;
            const body = `## 🚨 bazi 线上部署验收失败 (V2 — 10 项全自动)

            ${results}

            ---

            ## 修复指引

            @trae 请进场修复, 步骤:
            1. 读 [V10.8_Bug修复经验_DS.md](https://github.com/clawang2433-commits/bazi/blob/main/docs/specs/2026-07-11_v10.8_specs/V10.8_Bug修复经验_DS.md) 找类似 bug
            2. 读 [Deploy.md 已知坑清单](https://github.com/clawang2433-commits/bazi/blob/main/docs/deployment/Deploy.md) 对照症状
            3. 本地复现 → 修复 → pytest 过 → 开 PR (bazi repo)
            4. 开 PR 后 GitHub Action 会自动通知 @codewhale review
            5. CW review + merge → Leo 再部署 → 验收自动跑

            ## 失败项分析

            | 失败项 | 可能根因 | 查哪里 |
            |:--|:--|:--|
            | health(P0) | 后端完全挂了 | \`ssh root@47.243.141.8 "pm2 list && pm2 logs bazi-api --lines 20"\` |
            | frontend(P0) | Next.js 挂了或 nginx 502 | \`curl -I https://xiantianyiqi.cn/\` + \`ssh pm2 logs bazi-web\` |
            | login(P0) | 数据库挂或 JWT 密钥错 | \`ssh pm2 logs bazi-api --lines 50 \| grep -i error\` |
            | plugins(P1) | Agent 加载失败 | \`ssh pm2 logs bazi-api --lines 50 \| grep -i plugin\` |
            | lightweight(P1) | Worker crash / mode=lightweight | \`ssh pm2 logs bazi-worker --lines 50 \| grep -iE 'error\|crash'\` |
            | fullmode(P0) | Worker crash / OOM / LLM 超时 / aiosqlite | \`ssh pm2 logs bazi-worker --lines 100 \| grep -iE 'error\|crash\|oom\|aiosqlite'\` |
            | synastry(P0) | heqi agent 失败 / 合盘 LLM 超时 | \`ssh pm2 logs bazi-worker --lines 100 \| grep -iE 'heqi\|synastry'\` |
            | shenji(P1) | plugin worker 失败 / 户口本未注入 | \`ssh pm2 logs bazi-worker --lines 50 \| grep -iE 'plugin\|profile'\` |
            | tcm(P1) | health plugin 失败 / TCM 注入失败 | \`ssh pm2 logs bazi-worker --lines 50 \| grep -iE 'health\|tcm'\` |
            | history(P0) | 历史记录无数据 / report 字段缺失 | \`curl /api/v1/bazi/history\` + 查 DB tasks 表 |

            ## 服务器诊断命令
            \`\`\`bash
            ssh root@47.243.141.8 "pm2 list && free -m && pm2 logs bazi-worker --lines 30 --nostream"
            \`\`\`

            ---
            - **bazi PR deployed**: #${prNumber}
            - **Deploy note**: ${deployNote}
            - **test_suite**: ${{ env.TEST_SUITE }}
            - **Triggered by**: ${{ github.actor }} via ${{ github.event_name }}
            - **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            `;
            const issue = await github.rest.issues.create({
              ...context.repo,
              title: title,
              body: body,
              labels: ['bazi', 'bug', priority.toLowerCase(), 'deploy-failed', 'v10.8']
            });
            console.log(`✅ Issue #${issue.data.number} created: ${issue.data.html_url}`);

      - name: Success
        if: always() && env.ALL_FAILS == ''
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ✅ 部署验收通过 (V2 — 10 项全自动)            ║"
          echo "║  线上健康, 3 大按钮 + 神机 + 中医库 + 历史全过  ║"
          echo "╚══════════════════════════════════════════════╝"
          cat /tmp/results.md
