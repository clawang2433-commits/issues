name: Issue Triage

# 监听 issues repo 自己的 issue 事件, 自动打标签
# 规则 SSOT: 仓库根目录 bug-routing-rules.yml

on:
  issues:
    types: [opened, reopened, edited]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点巡检

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load routing rules
        id: load_rules
        run: |
          python3 << 'EOF'
          import yaml, json
          with open('bug-routing-rules.yml') as f:
              rules = yaml.safe_load(f)
          # 导出标签规则给后续 step 使用
          labels = rules.get('labels', {})
          print(f"::set-output name=project_labels::{json.dumps([l['name'] for l in labels.get('project', [])])}")
          print(f"::set-output name=type_labels::{json.dumps(labels.get('type', []))}")
          EOF

      - name: Auto-label issues
        uses: actions/github-script@v7
        with:
          script: |
            const projectLabels = JSON.parse('${{ steps.load_rules.outputs.project_labels }}');
            const typeLabelDefs = JSON.parse('${{ steps.load_rules.outputs.type_labels }}');

            // 处理 schedule 巡检: 遍历所有 open issue
            let issueList = [];
            if (context.eventName === 'schedule') {
              const issues = await github.rest.issues.listForRepo({
                ...context.repo,
                state: 'open',
                per_page: 100
              });
              issueList = issues.data;
            } else if (context.payload.issue) {
              issueList = [context.payload.issue];
            }

            for (const issue of issueList) {
              const title = issue.title || '';
              const body = issue.body || '';
              const text = (title + ' ' + body).toLowerCase();
              const currentLabels = issue.labels.map(l => l.name);
              const newLabels = new Set(currentLabels);

              // 项目标签: 标题或正文含 [bazi] 或 bazi/ 路径引用
              if (/\[bazi\]|bazi\/|八字|排盘|合盘/i.test(title + ' ' + body)) {
                if (!currentLabels.includes('bazi')) newLabels.add('bazi');
              }

              // 类型标签: 关键词匹配
              if (!currentLabels.some(l => typeLabelDefs.find(t => t.name === l))) {
                if (/bug|error|crash|fail|报错|异常|失败|修复/i.test(title + ' ' + body)) {
                  newLabels.add('bug');
                } else if (/feature|新功能|需求|添加/i.test(title + ' ' + body)) {
                  newLabels.add('feature');
                } else if (/improvement|优化|改进|提升/i.test(title + ' ' + body)) {
                  newLabels.add('improvement');
                } else if (/doc|文档|readme/i.test(title + ' ' + body)) {
                  newLabels.add('documentation');
                } else if (/question|疑问|提问|？|\?/i.test(title + ' ' + body)) {
                  newLabels.add('question');
                }
              }

              // 优先级标签
              if (!currentLabels.some(l => ['P0', 'P1', 'P2'].includes(l))) {
                if (/p0|critical|严重|阻塞|线上故障|crash/i.test(title + ' ' + body)) {
                  newLabels.add('P0');
                } else if (/p1|high|重要/i.test(title + ' ' + body)) {
                  newLabels.add('P1');
                } else if (/p2|medium|中等/i.test(title + ' ' + body)) {
                  newLabels.add('P2');
                }
              }

              // 版本标签
              if (!currentLabels.some(l => /^v\d+\.\d+$/.test(l))) {
                const versionMatch = (title + ' ' + body).match(/v(\d+\.\d+)/i);
                if (versionMatch) {
                  newLabels.add('v' + versionMatch[1]);
                }
              }

              // 计算 diff
              const toAdd = [...newLabels].filter(l => !currentLabels.includes(l));
              if (toAdd.length > 0) {
                try {
                  await github.rest.issues.addLabels({
                    ...context.repo,
                    issue_number: issue.number,
                    labels: toAdd
                  });
                  console.log(`Issue #${issue.number}: added labels ${toAdd.join(', ')}`);
                } catch (err) {
                  // 标签可能不存在, 先创建再添加
                  for (const label of toAdd) {
                    try {
                      await github.rest.issues.createLabel({
                        ...context.repo,
                        name: label,
                        color: 'ededed'
                      });
                    } catch (e) {
                      // label 已存在, 忽略
                    }
                  }
                  await github.rest.issues.addLabels({
                    ...context.repo,
                    issue_number: issue.number,
                    labels: toAdd
                  });
                  console.log(`Issue #${issue.number}: created and added labels ${toAdd.join(', ')}`);
                }
              }
            }
